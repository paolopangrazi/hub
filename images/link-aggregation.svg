<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 210" font-family="'DM Mono',monospace" font-size="11">
  <rect width="560" height="210" rx="6" fill="#f4f4f4"/>
  <text x="280" y="22" text-anchor="middle" fill="#10183a" font-size="12" font-weight="bold">Link Aggregation Group (LAG) — IEEE 802.3ad</text>
  <!-- Switch A -->
  <rect x="15" y="38" width="95" height="110" rx="5" fill="#10183a" stroke="#00FA9A" stroke-width="2"/>
  <text x="62" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Switch</text>
  <text x="62" y="110" text-anchor="middle" fill="#00FA9A" font-size="16" font-weight="bold">A</text>
  <!-- Switch B -->
  <rect x="450" y="38" width="95" height="110" rx="5" fill="#10183a" stroke="#00FA9A" stroke-width="2"/>
  <text x="497" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Switch</text>
  <text x="497" y="110" text-anchor="middle" fill="#00FA9A" font-size="16" font-weight="bold">B</text>
  <!-- Link 1 -->
  <text x="280" y="68" text-anchor="middle" fill="#4a9eff">link 1 · 1 Gbps</text>
  <line x1="110" y1="75" x2="447" y2="75" stroke="#4a9eff" stroke-width="3"/>
  <polygon points="443,71 453,75 443,79" fill="#4a9eff"/>
  <!-- Link 2 -->
  <text x="280" y="93" text-anchor="middle" fill="#28a87a">link 2 · 1 Gbps</text>
  <line x1="110" y1="100" x2="447" y2="100" stroke="#00FA9A" stroke-width="3"/>
  <polygon points="443,96 453,100 443,104" fill="#00FA9A"/>
  <!-- Link 3 -->
  <text x="280" y="118" text-anchor="middle" fill="#cc7a2a">link 3 · 1 Gbps</text>
  <line x1="110" y1="125" x2="447" y2="125" stroke="#ff9f43" stroke-width="3"/>
  <polygon points="443,121 453,125 443,129" fill="#ff9f43"/>
  <!-- Bracket converging -->
  <path d="M110,152 L280,168 L450,152" fill="none" stroke="#10183a" stroke-width="1.5"/>
  <!-- Result -->
  <text x="280" y="193" text-anchor="middle" fill="#10183a" font-size="11" font-weight="bold">⇒ 1 Logical Link · 3 Gbps total · fault tolerant</text>
</svg>
