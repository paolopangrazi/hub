  <line x1="70" y1="120" x2="135" y2="158" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="68" x2="220" y2="72" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="68" x2="225" y2="150" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="68" x2="135" y2="158" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
