<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 230" font-family="'DM Mono',monospace" font-size="11">
  <rect width="560" height="230" rx="6" fill="#f4f4f4"/>
  <rect x="0" y="0" width="279" height="230" rx="6" fill="#fff0f0"/>
  <rect x="281" y="0" width="279" height="230" rx="6" fill="#f0fff8"/>
