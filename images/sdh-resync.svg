  <text x="420" y="22" text-anchor="middle" fill="#1a7a4a" font-size="12" font-weight="bold">➡️ After · O(n²) · BFS</text>
  <!-- LEFT: all-pairs red chaos lines — nodes: A(70,120) B(140,68) C(220,72) D(225,150) E(135,158) -->
