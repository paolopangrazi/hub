  <text x="140" y="210" text-anchor="middle" fill="#c0392b" font-size="10">all node combinations checked — O(n³)</text>
  <!-- RIGHT: BFS tree — nodes: A(355,120) B(425,68) C(505,72) D(505,155) E(420,158) -->
  <line x1="355" y1="120" x2="425" y2="68" stroke="#00a86b" stroke-width="2.5"/>
  <line x1="355" y1="120" x2="420" y2="158" stroke="#00a86b" stroke-width="2.5"/>
  <line x1="425" y1="68" x2="505" y2="72" stroke="#00a86b" stroke-width="2.5"/>
  <line x1="420" y1="158" x2="505" y2="155" stroke="#00a86b" stroke-width="2.5"/>
  <circle cx="355" cy="120" r="16" fill="#00FA9A" stroke="#10183a" stroke-width="2"/>
  <text x="355" y="125" text-anchor="middle" fill="#10183a" font-weight="bold">A</text>
  <text x="334" y="123" text-anchor="end" fill="#10183a" font-size="9">start</text>
  <circle cx="425" cy="68" r="16" fill="#00FA9A" stroke="#10183a" stroke-width="2"/>
  <text x="425" y="73" text-anchor="middle" fill="#10183a" font-weight="bold">B</text>
  <circle cx="505" cy="72" r="16" fill="#00FA9A" stroke="#10183a" stroke-width="2"/>
  <text x="505" y="77" text-anchor="middle" fill="#10183a" font-weight="bold">C</text>
  <circle cx="505" cy="155" r="16" fill="#00FA9A" stroke="#10183a" stroke-width="2"/>
  <text x="505" y="160" text-anchor="middle" fill="#10183a" font-weight="bold">D</text>
  <circle cx="420" cy="158" r="16" fill="#00FA9A" stroke="#10183a" stroke-width="2"/>
  <text x="420" y="163" text-anchor="middle" fill="#10183a" font-weight="bold">E</text>
  <text x="420" y="210" text-anchor="middle" fill="#1a7a4a" font-size="10">each node visited exactly once — O(n²)</text>
