  <circle cx="70" cy="120" r="16" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="70" y="125" text-anchor="middle" fill="#10183a" font-weight="bold">A</text>
  <circle cx="140" cy="68" r="16" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="140" y="73" text-anchor="middle" fill="#10183a" font-weight="bold">B</text>
  <circle cx="220" cy="72" r="16" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="220" y="77" text-anchor="middle" fill="#10183a" font-weight="bold">C</text>
  <circle cx="225" cy="150" r="16" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
  <text x="225" y="155" text-anchor="middle" fill="#10183a" font-weight="bold">D</text>
