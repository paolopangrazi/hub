<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D molecular viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9A%9B%EF%B8%8F</text></svg>">
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="toolbar">
    <label>Molecule:</label>
    <select id="molSelect"><option>Loading…</option></select>
    <span style="width:12px"></span>
    <label>Style:</label>
    <button data-style="line">Wireframe</button>
    <button data-style="stick" class="active">Stick</button>
    <button data-style="ballstick">Ball &amp; stick</button>
    <button data-style="sphere">Space-filling</button>
    <span style="width:12px"></span>
    <button id="spinBtn">▶ Spin</button>
    <button id="labelBtn">Toggle labels</button>
    <button id="resetBtn">Reset view</button>
    <span style="width:12px"></span>
    <button id="themeBtn">🌙 Dark</button>
  </div>

  <div id="tooltip"></div>
  <div id="main">
    <div id="left-sidebar">
      <button id="pane-toggle-left" title="Hide fingerprints">◂</button>
      <div id="left-rail-icon" title="MACCS fingerprint">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4a8 8 0 0 0-8 8v3"/>
          <path d="M12 8a4 4 0 0 0-4 4v6"/>
          <path d="M12 12v6"/>
          <path d="M16 12a4 4 0 0 0-4-4"/>
          <path d="M20 12a8 8 0 0 0-3-6.2"/>
          <path d="M16 14v3"/>
        </svg>
        <span id="left-rail-label">FINGERPRINTS</span>
      </div>
      <div id="fp-section" class="section">
        <div class="section-head">
          <h2>MACCS fingerprint <span class="caret">▾</span></h2>
          <span class="meta" id="fp-meta"></span>
        </div>
        <div class="section-body">
          <div id="fp-grid"></div>
        </div>
      </div>

      <div id="sim-section" class="section">
        <div class="section-head">
          <h2>Similar molecules <span class="caret">▾</span></h2>
          <span class="meta">Tanimoto</span>
        </div>
        <div class="section-body">
          <div id="sim-list"></div>
        </div>
      </div>
    </div>
    <div id="center">
      <div id="viewer">
        <div id="elem-panel">
          <div id="ep-header">
            <span id="ep-z"></span>
            <span id="ep-sym"></span>
            <span id="ep-name"></span>
            <span id="ep-cat"></span>
          </div>
          <div id="ep-table"></div>
          <button id="ep-close">×</button>
        </div>
      </div>
      <div id="notation-bar">
        <button id="notation-toggle" title="Hide notations">▾</button>
        <div id="notation-content"></div>
        <div id="notation-rail" title="Annotations">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
            <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
          <span id="notation-rail-label">ANNOTATIONS</span>
          <span id="notation-rail-arrow">▴</span>
        </div>
      </div>
    </div>
    <div id="sidebar">
      <button id="pane-toggle" title="Hide descriptors">▸</button>
      <div id="right-rail-icon" title="Descriptors">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="6" x2="20" y2="6"/>
          <line x1="9" y1="12" x2="20" y2="12"/>
          <line x1="9" y1="18" x2="20" y2="18"/>
          <line x1="4" y1="6" x2="4.01" y2="6"/>
          <line x1="4" y1="12" x2="4.01" y2="12"/>
          <line x1="4" y1="18" x2="4.01" y2="18"/>
        </svg>
        <span id="right-rail-label">DESCRIPTORS</span>
      </div>
      <div id="desc-section" class="section">
        <div class="section-head">
          <h2>Descriptors <span class="caret">▾</span></h2>
        </div>
        <div class="section-body">
          <table id="desc-table"><tr><td colspan="2" style="color:var(--muted)">Select a molecule</td></tr></table>
          <a id="chembl-link" target="_blank" style="display:none"></a>
        </div>
      </div>
    </div>
  </div>

<script type="module" src="js/main.js"></script>
</body>
</html>
