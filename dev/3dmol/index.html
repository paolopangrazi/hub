<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D molecular viewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9A%9B%EF%B8%8F</text></svg>">
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<style>
  :root {
    --bg:        #0d1117;
    --fg:        #e6edf3;
    --border:    #21262d;
    --muted:     #8b949e;
    --btn-bg:    #21262d;
    --btn-hover: #30363d;
    --btn-bdr:   #30363d;
    --link:      #58a6ff;
    --viewer-bg: #0d1117;
    --sidebar-bg:#161b22;
    color-scheme: dark;
  }
  :root.light {
    --bg:        #ffffff;
    --fg:        #1f2328;
    --border:    #d0d7de;
    --muted:     #656d76;
    --btn-bg:    #f6f8fa;
    --btn-hover: #e8ecf0;
    --btn-bdr:   #d0d7de;
    --link:      #0969da;
    --viewer-bg: #f6f8fa;
    --sidebar-bg:#f6f8fa;
    color-scheme: light;
  }

  html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
  body { background: var(--bg); color: var(--fg); display: flex; flex-direction: column; }

  #toolbar {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 10px 18px; border-bottom: 1px solid var(--border); align-items: center;
  }
  #toolbar label { font-size: 0.8rem; color: var(--muted); }
  button, select {
    background: var(--btn-bg); color: var(--fg);
    border: 1px solid var(--btn-bdr); border-radius: 6px;
    padding: 6px 12px; font-size: 0.82rem; cursor: pointer;
  }
  button:hover, select:hover { background: var(--btn-hover); }
  button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #molSelect { max-width: 280px; }

  /* Main content row: viewer + sidebar */
  #main {
    display: flex;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
  }

  /* Center column between the panes: viewer on top, notation bar below */
  #center {
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #viewer {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }

  #sidebar, #left-sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 16px;
    font-size: 0.78rem;
  }
  /* Left panel: border on its right edge, sections start flush at the top */
  #left-sidebar { width: 300px; border-left: none; border-right: 1px solid var(--border); position: relative; overflow-x: hidden; }
  /* Collapse handle tucked into the left padding gutter so it takes no space */
  #pane-toggle-left {
    position: absolute; top: 10px; left: 2px; z-index: 2;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 0 2px;
  }
  #pane-toggle-left:hover { color: var(--fg); }
  body.hide-left #left-sidebar { width: 22px; padding: 0; overflow: hidden; }
  body.hide-left #left-sidebar .section { display: none; }
  body.hide-left #pane-toggle-left { left: 0; right: 0; text-align: center; }
  /* Fingerprint hint icon shown only on the collapsed rail, below the arrow */
  #left-rail-icon {
    display: none; position: absolute; top: 34px; left: 0; right: 0;
    z-index: 2; text-align: center; font-size: 1rem; line-height: 0;
    color: var(--muted); cursor: pointer;
  }
  #left-rail-icon:hover { color: var(--fg); }
  body.hide-left #left-rail-icon { display: flex; flex-direction: column-reverse; align-items: center; gap: 6px; }
  #left-rail-label {
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    font-size: 0.62rem; letter-spacing: 0.12em; font-weight: 600;
    color: var(--muted);
  }
  /* Descriptors pane collapse handle — absolutely placed so it takes no space */
  #sidebar { position: relative; }
  #pane-toggle {
    position: absolute; top: 10px; right: 8px; z-index: 2;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 2px;
  }
  #pane-toggle:hover { color: var(--fg); }
  /* Collapsed: pane shrinks to a thin rail holding only the handle */
  body.hide-desc #sidebar { width: 22px; padding: 0; overflow: hidden; }
  body.hide-desc #sidebar #desc-section { display: none; }
  body.hide-desc #pane-toggle { left: 0; right: 0; text-align: center; }
  /* Descriptors hint icon shown only on the collapsed rail, below the arrow */
  #right-rail-icon {
    display: none; position: absolute; top: 34px; left: 0; right: 0;
    z-index: 2; text-align: center; font-size: 1rem; line-height: 0;
    color: var(--muted); cursor: pointer;
  }
  #right-rail-icon:hover { color: var(--fg); }
  body.hide-desc #right-rail-icon { display: flex; flex-direction: column-reverse; align-items: center; gap: 6px; }
  #right-rail-label {
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    font-size: 0.62rem; letter-spacing: 0.12em; font-weight: 600;
    color: var(--muted);
  }
  #left-sidebar .section:first-child,
  #sidebar .section:first-child { margin-top: 0; border-top: none; padding-top: 0; }
  #sidebar h2, #left-sidebar h2 {
    margin: 0 0 10px;
    font-size: 0.82rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #desc-table { width: 100%; border-collapse: collapse; }
  #desc-table tr { border-bottom: 1px solid var(--border); }
  #desc-table tr:last-child { border-bottom: none; }
  #desc-table td { padding: 5px 2px; vertical-align: top; }
  #desc-table td:first-child { color: var(--muted); width: 55%; }
  #desc-table td:last-child  { text-align: right; font-variant-numeric: tabular-nums; }
  #desc-table tr.row-clickable { cursor: pointer; }
  /* Row hover/active tint matches each overlay's highlight colour */
  #desc-table tr.row-clickable:hover td:first-child { color: #f59e0b; }
  #desc-table tr.row-active td:first-child { color: #f59e0b; font-weight: 600; }
  #desc-table tr.row-active { background: rgba(245,158,11,0.08); }
  #desc-table tr[data-action="Rotatable bonds"].row-clickable:hover td:first-child,
  #desc-table tr[data-action="Rotatable bonds"].row-active td:first-child { color: #22d3ee; }
  #desc-table tr[data-action="Rotatable bonds"].row-active { background: rgba(34,211,238,0.08); }
  #desc-table tr[data-action="H-bond donors"].row-clickable:hover td:first-child,
  #desc-table tr[data-action="H-bond donors"].row-active td:first-child { color: #4ade80; }
  #desc-table tr[data-action="H-bond donors"].row-active { background: rgba(74,222,128,0.08); }
  #desc-table tr[data-action="H-bond acceptors"].row-clickable:hover td:first-child,
  #desc-table tr[data-action="H-bond acceptors"].row-active td:first-child { color: #ec4899; }
  #desc-table tr[data-action="H-bond acceptors"].row-active { background: rgba(236,72,153,0.08); }
  /* Rows flagged while hovering the Ro5 violations badge */
  #desc-table tr.ro5-hot { background: rgba(248,81,73,0.16); }
  #desc-table tr.ro5-hot td { color: #f85149; }
  .badge {
    display: inline-block; padding: 1px 6px; border-radius: 10px;
    font-size: 0.72rem; font-weight: 600;
  }
  .badge-green  { background: #1a4731; color: #3fb950; }
  .badge-red    { background: #4d1c1c; color: #f85149; }
  .badge-yellow { background: #3d2f00; color: #d29922; }
  :root.light .badge-green  { background: #d4f0dc; color: #1a7f37; }
  :root.light .badge-red    { background: #fde8e8; color: #cf222e; }
  :root.light .badge-yellow { background: #fff3cd; color: #9a6700; }
  /* Collapsible line-notation bar at the bottom of the viewer column */
  #notation-bar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--sidebar-bg);
  }
  #notation-toggle {
    display: block; width: 100%;
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.8rem; line-height: 1; padding: 3px 0;
  }
  #notation-toggle:hover { color: var(--fg); }
  #notation-content {
    padding: 0 16px 8px;
    display: flex; flex-direction: column; gap: 3px;
    font-size: 0.72rem;
  }
  body.hide-notation #notation-content { display: none; }
  /* Annotations hint label shown only when the bottom bar is collapsed */
  #notation-bar { position: relative; }
  #notation-rail {
    display: none; position: absolute; top: 0; bottom: 0; left: 0; right: 0;
    align-items: center; justify-content: center; gap: 6px;
    color: var(--muted); cursor: pointer;
  }
  #notation-rail:hover { color: var(--fg); }
  body.hide-notation #notation-rail { display: flex; }
  /* Keep the full-width button clickable but hide its glyph; the rail draws the arrow */
  body.hide-notation #notation-toggle { color: transparent; }
  #notation-rail-arrow { font-size: 0.8rem; line-height: 1; }
  #notation-rail-label {
    font-size: 0.62rem; letter-spacing: 0.12em; font-weight: 600;
  }
  .nb-item { display: flex; gap: 10px; align-items: baseline; }
  .nb-label {
    flex-shrink: 0; width: 52px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.62rem;
  }
  .nb-val { font-family: monospace; word-break: break-all; line-height: 1.35; min-width: 0; }
  #chembl-link { color: var(--link); text-decoration: none; font-size: 0.72rem; display: block; margin-top: 10px; }
  #chembl-link:hover { text-decoration: underline; }

  /* Collapsible sidebar sections (fingerprint, similar molecules) */
  .section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 12px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .section-head h2 { margin: 0; }
  .section-head .meta { font-size: 0.7rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .section.collapsed .section-body { display: none; }
  .section-head .caret { color: var(--muted); font-size: 0.7rem; margin-left: 6px; }
  .section.collapsed .section-head .caret { transform: rotate(-90deg); display: inline-block; }

  /* MACCS bit grid */
  #fp-grid {
    display: grid; grid-template-columns: repeat(16, 1fr);
    gap: 2px; margin-top: 8px;
  }
  .fpcell {
    aspect-ratio: 1; border-radius: 2px;
    background: var(--btn-bg); border: 1px solid var(--btn-bdr);
  }
  .fpcell.on { background: #a78bfa; border-color: #a78bfa; cursor: pointer; }
  .fpcell.on:hover { background: #c4b5fd; }
  .fpcell.on.active { background: #7c3aed; border-color: #7c3aed; box-shadow: 0 0 0 1px #7c3aed; }

  /* Similar-molecules list */
  #sim-list { margin-top: 8px; }
  .sim-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 4px 6px; border-radius: 5px; cursor: pointer;
  }
  .sim-row:hover { background: var(--btn-hover); }
  .sim-main { flex: 1; min-width: 0; }   /* fixed-width column so bar %s are comparable */
  .sim-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sim-score {
    flex-shrink: 0; font-variant-numeric: tabular-nums; color: var(--muted);
    font-size: 0.72rem;
  }
  .sim-track {
    width: 100%; height: 3px; border-radius: 2px; margin-top: 2px;
    background: rgba(167,139,250,0.18); overflow: hidden;
  }
  .sim-bar { height: 100%; border-radius: 2px; background: #a78bfa; }

  .tip {
    color: var(--muted); font-size: 0.7rem; font-style: normal;
    cursor: default; margin-left: 3px; vertical-align: middle;
    font-weight: 700;
  }
  #tooltip {
    position: fixed; z-index: 9999; display: none;
    background: #1c2128; color: #e6edf3;
    padding: 7px 10px; border-radius: 6px;
    font-size: 0.72rem; line-height: 1.5;
    max-width: 220px; width: max-content;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    pointer-events: none; white-space: pre-line;
  }

  /* Element info panel — a compact horizontal strip along the bottom of the
     viewer so it doesn't cover the molecule. Shown by JS via display:flex. */
  #elem-panel {
    display: none;
    position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 20;
    max-width: calc(100% - 24px); align-items: stretch;
    background: var(--sidebar-bg); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 3px 14px rgba(0,0,0,0.35);
    font-size: 0.7rem; line-height: 1.2;
  }
  /* Whole element identity on one line: Z, symbol, name, category */
  #ep-header {
    display: flex; align-items: baseline; gap: 6px;
    padding: 4px 10px; border-right: 1px solid var(--border); flex-shrink: 0;
  }
  #ep-z   { font-size: 0.58rem; color: var(--muted); }
  #ep-sym { font-size: 1.3rem; font-weight: 700; line-height: 1; }
  #ep-name{ font-size: 0.76rem; font-weight: 600; }
  #ep-cat { font-size: 0.6rem; color: var(--muted); }
  /* Properties as tight horizontal columns */
  #ep-table { display: flex; flex-direction: row; min-width: 0; }
  .ep-item {
    display: flex; flex-direction: column; justify-content: center; gap: 1px;
    padding: 3px 9px; border-right: 1px solid var(--border);
    white-space: nowrap; flex-shrink: 0;
  }
  .ep-lbl { font-size: 0.54rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .ep-val { font-size: 0.72rem; font-variant-numeric: tabular-nums; }
  #ep-close {
    flex-shrink: 0; align-self: stretch; padding: 0 8px;
    background: none; border: none; border-left: 1px solid var(--border);
    color: var(--muted); font-size: 1rem; cursor: pointer; line-height: 1;
  }
  #ep-close:hover { color: var(--fg); background: var(--btn-hover); }
</style>
</head>
<body class="hide-left">
  <div id="toolbar">
    <label>Molecule:</label>
    <select id="molSelect"><option>Loading…</option></select>
    <span style="width:12px"></span>
    <label>Style:</label>
    <button data-style="line">Wireframe</button>
    <button data-style="stick" class="active">Stick</button>
    <button data-style="ballstick">Ball &amp; stick</button>
    <button data-style="sphere">Space-filling</button>
    <span style="width:12px"></span>
    <button id="spinBtn">▶ Spin</button>
    <button id="labelBtn">Toggle labels</button>
    <button id="resetBtn">Reset view</button>
    <span style="width:12px"></span>
    <button id="themeBtn">🌙 Dark</button>
  </div>

  <div id="tooltip"></div>
  <div id="main">
    <div id="left-sidebar">
      <button id="pane-toggle-left" title="Show fingerprints">▸</button>
      <div id="left-rail-icon" title="MACCS fingerprint">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 4a8 8 0 0 0-8 8v3"/>
          <path d="M12 8a4 4 0 0 0-4 4v6"/>
          <path d="M12 12v6"/>
          <path d="M16 12a4 4 0 0 0-4-4"/>
          <path d="M20 12a8 8 0 0 0-3-6.2"/>
          <path d="M16 14v3"/>
        </svg>
        <span id="left-rail-label">FINGERPRINTS</span>
      </div>
      <div id="fp-section" class="section">
        <div class="section-head">
          <h2>MACCS fingerprint <span class="caret">▾</span></h2>
          <span class="meta" id="fp-meta"></span>
        </div>
        <div class="section-body">
          <div id="fp-grid"></div>
        </div>
      </div>

      <div id="sim-section" class="section">
        <div class="section-head">
          <h2>Similar molecules <span class="caret">▾</span></h2>
          <span class="meta">Tanimoto</span>
        </div>
        <div class="section-body">
          <div id="sim-list"></div>
        </div>
      </div>
    </div>
    <div id="center">
      <div id="viewer">
        <div id="elem-panel">
          <div id="ep-header">
            <span id="ep-z"></span>
            <span id="ep-sym"></span>
            <span id="ep-name"></span>
            <span id="ep-cat"></span>
          </div>
          <div id="ep-table"></div>
          <button id="ep-close">×</button>
        </div>
      </div>
      <div id="notation-bar">
        <button id="notation-toggle" title="Hide notations">▾</button>
        <div id="notation-content"></div>
        <div id="notation-rail" title="Annotations">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
            <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
          <span id="notation-rail-label">ANNOTATIONS</span>
          <span id="notation-rail-arrow">▴</span>
        </div>
      </div>
    </div>
    <div id="sidebar">
      <button id="pane-toggle" title="Hide descriptors">▸</button>
      <div id="right-rail-icon" title="Descriptors">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="6" x2="20" y2="6"/>
          <line x1="9" y1="12" x2="20" y2="12"/>
          <line x1="9" y1="18" x2="20" y2="18"/>
          <line x1="4" y1="6" x2="4.01" y2="6"/>
          <line x1="4" y1="12" x2="4.01" y2="12"/>
          <line x1="4" y1="18" x2="4.01" y2="18"/>
        </svg>
        <span id="right-rail-label">DESCRIPTORS</span>
      </div>
      <div id="desc-section" class="section">
        <div class="section-head">
          <h2>Descriptors <span class="caret">▾</span></h2>
        </div>
        <div class="section-body">
          <table id="desc-table"><tr><td colspan="2" style="color:var(--muted)">Select a molecule</td></tr></table>
          <a id="chembl-link" target="_blank" style="display:none"></a>
        </div>
      </div>
    </div>
  </div>

<script>
  const THEME = {
    dark:  { bg: "#0d1117", cls: "" },
    light: { bg: "#f6f8fa", cls: "light" },
  };
  let theme = "light";

  const themeBtn = document.getElementById("themeBtn");
  themeBtn.addEventListener("click", () => {
    theme = theme === "dark" ? "light" : "dark";
    const t = THEME[theme];
    document.documentElement.className = t.cls;
    viewer.setBackgroundColor(t.bg);
    viewer.render();
    themeBtn.textContent = theme === "dark" ? "☀️ Light" : "🌙 Dark";
  });

  // Hide/show the descriptors pane (toggle lives on the pane itself) to give the
  // viewer more room. Collapsed, the pane shrinks to a thin rail holding the handle.
  // Each pane toggles from its arrow button and — when collapsed — from the whole
  // rail (label + icon), so clicking the vertical/horizontal label expands it too.
  const paneToggle = document.getElementById("pane-toggle");
  const toggleDesc = () => {
    const hidden = document.body.classList.toggle("hide-desc");
    paneToggle.textContent = hidden ? "◂" : "▸";
    paneToggle.title = hidden ? "Show descriptors" : "Hide descriptors";
    viewer.resize();   // let 3Dmol pick up the widened/narrowed container
    viewer.render();
  };
  paneToggle.addEventListener("click", toggleDesc);
  document.getElementById("right-rail-icon").addEventListener("click", toggleDesc);

  const paneToggleLeft = document.getElementById("pane-toggle-left");
  const toggleLeft = () => {
    const hidden = document.body.classList.toggle("hide-left");
    paneToggleLeft.textContent = hidden ? "▸" : "◂";
    paneToggleLeft.title = hidden ? "Show fingerprints" : "Hide fingerprints";
    viewer.resize();
    viewer.render();
  };
  paneToggleLeft.addEventListener("click", toggleLeft);
  document.getElementById("left-rail-icon").addEventListener("click", toggleLeft);

  const notationToggle = document.getElementById("notation-toggle");
  const toggleNotation = () => {
    const hidden = document.body.classList.toggle("hide-notation");
    notationToggle.textContent = hidden ? "▴" : "▾";
    notationToggle.title = hidden ? "Show notations" : "Hide notations";
    viewer.resize();
    viewer.render();
  };
  notationToggle.addEventListener("click", toggleNotation);
  document.getElementById("notation-rail").addEventListener("click", toggleNotation);

  const viewer = $3Dmol.createViewer("viewer", { backgroundColor: THEME[theme].bg });

  const STYLES = {
    stick:     { stick: { radius: 0.15 } },
    ballstick: { stick: { radius: 0.12 }, sphere: { scale: 0.28 } },
    sphere:    { sphere: { scale: 1.0 } },
    line:      { stick: { radius: 0.04, colorscheme: "Jmol" } },
  };

  let labelsOn = false;
  let currentStyle = "stick";

  function applyStyle(name) {
    currentStyle = name;
    repaintOverlays(); // lays down the base style and reapplies any active overlays
    document.querySelectorAll("#toolbar button[data-style]").forEach(b =>
      b.classList.toggle("active", b.dataset.style === name));
  }

  function toggleLabels() {
    labelsOn = !labelsOn;
    viewer.removeAllLabels();
    if (labelsOn) {
      viewer.getModel().selectedAtoms({}).forEach(atom => {
        viewer.addLabel(atom.elem, {
          position: { x: atom.x, y: atom.y, z: atom.z },
          fontSize: 11, fontColor: "white",
          backgroundColor: "black", backgroundOpacity: 0.55, inFront: true,
        });
      });
    }
    viewer.render();
  }

  function badge(val, green, red) {
    const cls = val ? "badge-green" : "badge-red";
    const txt = val ? green : red;
    return `<span class="badge ${cls}">${txt}</span>`;
  }

  function ro5Badge(n) {
    if (n === null || n === undefined) return "—";
    if (n === 0) return `<span class="badge badge-green">Pass (0)</span>`;
    return `<span class="badge badge-red ro5-badge">${n} violation${n === 1 ? "" : "s"}</span>`;
  }

  function fmt(v, digits = 2) {
    return v !== null && v !== undefined ? Number(v).toFixed(digits) : "—";
  }
  function fmtI(v) {
    return v !== null && v !== undefined ? v : "—";
  }

    ];

    // Which Lipinski Ro5 limits the displayed values break (for the hover highlight)
    const ro5Viol = new Set();
    if (e.mw   != null && e.mw   > 500) ro5Viol.add("Mol. weight");
    if (e.logP != null && e.logP > 5)   ro5Viol.add("LogP (AlogP)");
    if (e.hbd  != null && e.hbd  > 5)   ro5Viol.add("H-bond donors");
    if (e.hba  != null && e.hba  > 10)  ro5Viol.add("H-bond acceptors");

    const table = document.getElementById("desc-table");
    table.innerHTML = rows.map(([label, val, cls = ""]) => {
      const classAttr  = cls ? ` class="${cls}"` : "";

      return `<tr${classAttr}${actionAttr} data-row="${label}"><td>${label}${tip(label)}</td><td>${val}</td></tr>`;
    }).join("");

    // Line-notation strings shown full-width in the bottom bar of the main view
    document.getElementById("notation-content").innerHTML = [
      ["SMILES",  e.smiles],

        + `<span class="nb-val">${val}</span></div>`

    table.onclick = ev => {
      const row = ev.target.closest("tr[data-action]");
      const kind = row && ACTION_OVERLAY[row.dataset.action];
      if (kind) toggleOverlay(kind, row);
    };

    // Hovering the Ro5 badge flags, in red, the exact rows breaking a rule.
    const hotRo5 = on => table.querySelectorAll("tr[data-row]").forEach(r => {
      if (ro5Viol.has(r.dataset.row)) r.classList.toggle("ro5-hot", on);
    });
    table.onmouseover = ev => { if (ev.target.closest(".ro5-badge")) hotRo5(true); };
    table.onmouseout  = ev => { if (ev.target.closest(".ro5-badge")) hotRo5(false); };

    const link = document.getElementById("chembl-link");
    if (e.chembl_id) {
      link.href = `https://www.ebi.ac.uk/chembl/compound_report_card/${e.chembl_id}/`;
      link.textContent = `View ${e.chembl_id} on ChEMBL ↗`;
      link.style.display = "block";
    } else {
      link.style.display = "none";
    }
  }

  // The bond graph, ring perception and bridge set are derived once per molecule
  // and cached in molCache (cleared by resetOverlays on every molecule load).

  let molCache = null;
  const edgeKey = (a, b) => (a < b ? a + "-" + b : b + "-" + a);

  function getMol() {
    if (molCache) return molCache;
    const atoms = viewer.getModel().selectedAtoms({});
    const byIndex = new Map(atoms.map(a => [a.index, a]));

    // Heavy-atom adjacency: atomIndex -> [{ index, order }]  (H atoms excluded)
    const adj = new Map();
    for (const a of atoms) {
      if (a.elem === "H") continue;
      const nbrs = [];
      a.bonds.forEach((ni, k) => {
        const nb = byIndex.get(ni);
        if (nb && nb.elem !== "H") nbrs.push({ index: ni, order: a.bondOrder[k] ?? 1 });
      });
      adj.set(a.index, nbrs);
    }

    const mol = { byIndex, adj };
    mol.bridges = findBridges(adj);   // acyclic bonds (an edge in no ring)
    mol.rings   = perceiveRings(mol); // smallest ring through each ring bond
    mol.ringAtoms = new Set();        // every atom that lies in some ring
    mol.rings.forEach(r => r.forEach(i => mol.ringAtoms.add(i)));
    return (molCache = mol);
  }

  // Tarjan's bridge-finding: one DFS, O(V+E). An edge is a bridge iff it lies
  // in no cycle, so a bond is a ring bond exactly when it is NOT a bridge.
  function findBridges(adj) {
    const disc = new Map(), low = new Map(), bridges = new Set();
    let t = 0;
    const walk = (u, parent) => {
      disc.set(u, t); low.set(u, t); t++;
      for (const { index: v } of adj.get(u)) {
        if (v === parent) { parent = -2; continue; } // ignore the edge back once
        if (!disc.has(v)) {
          walk(v, u);
          low.set(u, Math.min(low.get(u), low.get(v)));
          if (low.get(v) > disc.get(u)) bridges.add(edgeKey(u, v));
        } else {
          low.set(u, Math.min(low.get(u), disc.get(v)));
        }
      }
    };
    for (const u of adj.keys()) if (!disc.has(u)) walk(u, -1);
    return bridges;
  }

  // For each ring bond, the shortest cycle through it (BFS back to the start
  // without using that bond). Deduped by atom set — an SSSR-like ring list.
  function perceiveRings(mol) {
    const { adj, bridges } = mol;
    const rings = [], seen = new Set();
    for (const u of adj.keys()) {
      for (const { index: v } of adj.get(u)) {
        if (u >= v || bridges.has(edgeKey(u, v))) continue;
        const ring = shortestCycle(adj, u, v);
        if (!ring) continue;
        const key = [...ring].sort((a, b) => a - b).join(",");
        if (!seen.has(key)) { seen.add(key); rings.push(ring); }
      }
    }
    return rings;
  }

  function shortestCycle(adj, u, v) {
    const prev = new Map([[v, -1]]);
    const queue = [v];
    while (queue.length) {
      const cur = queue.shift();
      if (cur === u) break;
      for (const { index: nb } of adj.get(cur)) {
        if ((cur === v && nb === u) || (cur === u && nb === v)) continue; // ban u–v
        if (!prev.has(nb)) { prev.set(nb, cur); queue.push(nb); }
      }
    }
    if (!prev.has(u)) return null;
    const path = [];
    for (let c = u; c !== -1; c = prev.get(c)) path.push(c);
    return path;
  }

  // Aromatic ring atoms in a 5–6 membered ring of C/N/O/S. A double bond to *any*
  // ring atom counts toward the π system, so fused rings whose formal doubles point
  // into the neighbouring ring (e.g. the imidazole of a purine) are still detected.
  // A ring qualifies when either:
  //   (a) every atom bears a π-system double bond or is a lone-pair donor, with ≥2
  //       such doubles — benzene, pyridine, pyrrole, furan, thiophene, imidazole… ; or
  //   (b) it is a 6-ring of all-sp2 atoms with ≥2 heteroatom donors and ≥1 ring double
  //       — xanthine / pyridinone rings that carry exocyclic C=O (e.g. caffeine).
  // Saturated rings, cyclohexene and quinones are rejected.
  function computeAromatic() {
    const mol = getMol();
    const AROM = new Set(["C", "N", "O", "S"]);
    const isDonor = e => e === "N" || e === "O" || e === "S";
    const result = new Set();
    for (const ring of mol.rings) {
      if (ring.length < 5 || ring.length > 6) continue;
      if (!ring.every(i => AROM.has(mol.byIndex.get(i).elem))) continue;

      let sysDoubles = 0, donors = 0, everyConjugated = true, everySp2 = true;
      for (const i of ring) {
        const nbrs = mol.adj.get(i), elem = mol.byIndex.get(i).elem;
        const ringDouble = nbrs.some(n => n.order === 2 && mol.ringAtoms.has(n.index));
        const anyDouble  = nbrs.some(n => n.order === 2);
        const donor      = isDonor(elem);
        if (ringDouble) sysDoubles++;
        if (donor && !ringDouble) donors++;
        if (!(ringDouble || donor)) everyConjugated = false;
        if (!(anyDouble  || donor)) everySp2 = false;
      }
      const conjugated     = everyConjugated && sysDoubles >= 2;
      const heteroAromatic = ring.length === 6 && everySp2 && donors >= 2 && sysDoubles >= 1;
      if (conjugated || heteroAromatic) ring.forEach(i => result.add(mol.byIndex.get(i).serial));
    }
    return [...result];
  }

  // Rotatable bond atoms: a single bond that is acyclic (a bridge), joins two
  // non-terminal heavy atoms, and touches no triple bond (excludes nitrile/alkyne).
  function computeRotatable() {
    const mol = getMol();
    const result = new Set();
    const hasTriple = i => mol.adj.get(i).some(n => n.order === 3);
    for (const u of mol.adj.keys()) {
      for (const { index: v, order } of mol.adj.get(u)) {
        if (u >= v || order !== 1) continue;              // each bond once, single only
        if (!mol.bridges.has(edgeKey(u, v))) continue;    // acyclic (not in a ring)
        if (mol.adj.get(u).length < 2 || mol.adj.get(v).length < 2) continue; // non-terminal
        if (hasTriple(u) || hasTriple(v)) continue;       // skip alkyne / nitrile
        result.add(mol.byIndex.get(u).serial);
        result.add(mol.byIndex.get(v).serial);
      }
    }
    return [...result];
  }

  // H-bond donor atoms: N or O bearing at least one hydrogen (N–H / O–H).
  function computeDonors() {
    const mol = getMol();
    const result = new Set();
    for (const atom of mol.byIndex.values()) {
      if (atom.elem !== "N" && atom.elem !== "O") continue;
      if (atom.bonds.some(ni => mol.byIndex.get(ni)?.elem === "H")) result.add(atom.serial);
    }
    return [...result];
  }

  // H-bond acceptor atoms: every N and O (the Lipinski Ro5 acceptor definition).
  function computeAcceptors() {
    const mol = getMol();
    const result = new Set();
    for (const atom of mol.byIndex.values())
      if (atom.elem === "N" || atom.elem === "O") result.add(atom.serial);
    return [...result];
  }

  // ── Highlight overlays ────────────────────────────────────────────────────
  // Any number of overlays can be active at once; repaint lays the current base
  // style down first, then recolors each active overlay's atoms on top of it.
  const OVERLAYS = {
    aromatic:  { color: "#f59e0b", compute: computeAromatic,  on: false, serials: null },
    rotatable: { color: "#22d3ee", compute: computeRotatable, on: false, serials: null },
    // acceptors before donors: donors ⊂ acceptors, so painting donors last keeps
    // them green while acceptor-only atoms stay violet when both overlays are on.
    acceptors: { color: "#ec4899", compute: computeAcceptors, on: false, serials: null },
    donors:    { color: "#4ade80", compute: computeDonors,    on: false, serials: null },
    // fpbit is transient (set directly by a MACCS bit click, no compute fn) and
    // painted last so the clicked substructure sits on top of any other overlay.
    fpbit:     { color: "#7c3aed", compute: () => [],         on: false, serials: null },
  };
  const ACTION_OVERLAY = {
    "Aromatic rings":    "aromatic",
    "Rotatable bonds":   "rotatable",
    "H-bond donors":     "donors",
    "H-bond acceptors":  "acceptors",
  };

  function repaintOverlays() {
    viewer.setStyle({}, STYLES[currentStyle]);
    for (const o of Object.values(OVERLAYS)) {
      if (!o.on || !o.serials || !o.serials.length) continue;
      const base = STYLES[currentStyle], hl = {};
      if (base.stick)  hl.stick  = { ...base.stick,  color: o.color };
      if (base.sphere) hl.sphere = { ...base.sphere, color: o.color };
      if (base.line)   hl.line   = { color: o.color };
      if (!hl.stick && !hl.sphere && !hl.line) hl.stick = { color: o.color, radius: 0.04 };
      viewer.setStyle({ serial: o.serials }, hl);
    }
    viewer.render();
  }

  function toggleOverlay(kind, row) {
    const o = OVERLAYS[kind];
    if (o.serials === null) o.serials = o.compute(); // computed lazily, then cached
    o.on = !o.on;
    row.classList.toggle("row-active", o.on);
    repaintOverlays();
  }

  function resetOverlays() {
    molCache = null;
    for (const o of Object.values(OVERLAYS)) { o.on = false; o.serials = null; }
  }

  // Tooltip (descriptor "*" markers and MACCS fingerprint cells)
  const tooltipEl = document.getElementById("tooltip");
  document.addEventListener("mouseover", e => {
    const t = e.target.closest(".tip, .fpcell");
    if (!t || !t.dataset.tip) return;
    tooltipEl.textContent = t.dataset.tip;
    tooltipEl.style.display = "block";
  });
  document.addEventListener("mousemove", e => {
    if (!tooltipEl.style.display || tooltipEl.style.display === "none") return;
    const x = e.clientX, y = e.clientY;
    const tw = tooltipEl.offsetWidth, th = tooltipEl.offsetHeight;
    tooltipEl.style.left = Math.min(x + 12, window.innerWidth  - tw - 8) + "px";
    tooltipEl.style.top  = Math.max(y - th - 10, 8) + "px";
  });
  document.addEventListener("mouseout", e => {
    if (e.target.closest(".tip, .fpcell")) tooltipEl.style.display = "none";
  });

  // ── MACCS fingerprints ────────────────────────────────────────────────────
  // maccsKeys: {bit: {smarts, desc}} legend; fpWords: name -> Uint32Array(6) of the
  // 166-bit vector (LSB-first, bit i-1). Both loaded once; fpWords powers the grid
  // and the Tanimoto similarity search. Per-molecule bit→atom maps are lazy-fetched.
  let maccsKeys = null, fpWords = new Map();
  let fpAtomsCache = { name: null, atoms: {} };
  let activeBit = null;

  function hexToWords(hex) {
    const v = BigInt("0x" + hex), words = new Uint32Array(6), MASK = 0xffffffffn;
    for (let w = 0; w < 6; w++) words[w] = Number((v >> BigInt(32 * w)) & MASK) >>> 0;
    return words;
  }
  function popcount(x) {
    x = x - ((x >>> 1) & 0x55555555);
    x = (x & 0x33333333) + ((x >>> 2) & 0x33333333);
    return (((x + (x >>> 4)) & 0x0f0f0f0f) * 0x01010101) >>> 24;
  }
  function bitOn(words, bit) { return (words[(bit - 1) >>> 5] >>> ((bit - 1) & 31)) & 1; }

  function tanimoto(a, b) {
    let inter = 0, uni = 0;
    for (let w = 0; w < 6; w++) { inter += popcount(a[w] & b[w]); uni += popcount(a[w] | b[w]); }
    return uni ? inter / uni : 0;
  }

  function renderFingerprint(name) {
    activeBit = null;
    OVERLAYS.fpbit.on = false; OVERLAYS.fpbit.serials = null;
    const grid = document.getElementById("fp-grid");
    const words = fpWords.get(name);
    if (!words || !maccsKeys) {
      document.getElementById("fp-meta").textContent = "unavailable";
      grid.innerHTML = ""; return;
    }
    let on = 0, html = "";
    for (let bit = 1; bit <= 166; bit++) {
      const set = bitOn(words, bit);
      if (set) on++;
      const k = maccsKeys[bit] || { help: "", smarts: "" };
      const lines = [`#${bit}  ${k.help || ""}`.trim()];     // bit + plain-English
      lines.push(k.smarts || "(count-based key — no formula)"); // SMARTS formula
      const tip = lines.join("\n").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
      html += `<div class="fpcell${set ? " on" : ""}" data-bit="${bit}" `
            + `data-tip="${tip}"></div>`;
    }
    grid.innerHTML = html;
    document.getElementById("fp-meta").textContent =
      `${on} / 166 · ${(100 * on / 166).toFixed(0)}%`;
  }

  // Click a set bit → highlight the atoms of every substructure match for that key.
  document.getElementById("fp-grid").addEventListener("click", async e => {
    const cell = e.target.closest(".fpcell.on");
    if (!cell) return;
    const bit = cell.dataset.bit;
    const name = currentName;

    if (activeBit === bit) {                       // toggle off
      activeBit = null;
      OVERLAYS.fpbit.on = false; OVERLAYS.fpbit.serials = null;
      cell.classList.remove("active");
      repaintOverlays();
      return;
    }

    if (fpAtomsCache.name !== name) {
      try { fpAtomsCache = { name, atoms: (await (await fetch(`db/fp/${name}.json`)).json()).atoms }; }
      catch { fpAtomsCache = { name, atoms: {} }; }
    }
    const matches = fpAtomsCache.atoms[bit];
    if (!matches) return;                          // key has no atom mapping

    const byIndex = getMol().byIndex;
    const serials = new Set();
    for (const match of matches)
      for (const idx of match) { const a = byIndex.get(idx); if (a) serials.add(a.serial); }

    document.querySelectorAll("#fp-grid .fpcell.active").forEach(c => c.classList.remove("active"));
    cell.classList.add("active");
    activeBit = bit;
    OVERLAYS.fpbit.serials = [...serials];
    OVERLAYS.fpbit.on = true;
    repaintOverlays();
  });

  function renderSimilar(name) {
    const list = document.getElementById("sim-list");
    const self = fpWords.get(name);
    if (!self) { list.innerHTML = ""; return; }
    const scored = [];
    for (const [other, w] of fpWords) {
      if (other === name) continue;
      scored.push([other, tanimoto(self, w)]);
    }
    scored.sort((a, b) => b[1] - a[1]);
    list.innerHTML = scored.slice(0, 10).map(([n, s]) => {
      const label = n.replace(/_/g, " ");
      return `<div class="sim-row" data-file="${n}.sdf" data-name="${label}">`
           + `<div class="sim-main"><div class="sim-name">${label}</div>`
           + `<div class="sim-track"><div class="sim-bar" style="width:${(s * 100).toFixed(1)}%"></div></div></div>`
           + `<span class="sim-score">${s.toFixed(2)}</span></div>`;
    }).join("");
  }

  document.getElementById("sim-list").addEventListener("click", e => {
    const row = e.target.closest(".sim-row");
    if (!row) return;
    molSelect.value = row.dataset.file;
    loadMolecule({ file: row.dataset.file, name: row.dataset.name });
  });

  // Collapsible sidebar sections
  document.querySelectorAll(".section-head").forEach(h =>
    h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed")));

  Promise.all([
    fetch("db/index.json").then(r => r.json()),
    fetch("db/maccs_keys.json").then(r => r.json()).catch(() => null),
    fetch("db/fp_index.json").then(r => r.json()).catch(() => ({})),
  ]).then(([entries, keys, fpIndex]) => {
    maccsKeys = keys;
    for (const [n, hex] of Object.entries(fpIndex)) fpWords.set(n, hexToWords(hex));
    molSelect.innerHTML = "";
    const start = entries.find(e => e.file === "abacavir.sdf") || entries[0];
    entries.forEach((entry) => {
      const opt = document.createElement("option");
      opt.textContent = entry.name;
      opt.value = entry.file;
      if (entry === start) opt.selected = true;
      molSelect.appendChild(opt);
    });
    loadMolecule(start);
  });
</script>
</body>
</html>
